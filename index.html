<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kode Cipta — Pembuat QR Code</title>
    <meta
      name="description"
      content="Aplikasi pembuat QR Code yang simpel dan cepat."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
      /* 
      PROJECT #8 - QR CODE GENERATOR
      THEME: Modern Clean Card
    */

      :root {
        --bg-color: #f3f4f6;
        --card-bg: #ffffff;
        --text-main: #1f2937;
        --text-muted: #6b7280;
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --border-color: #e5e7eb;
        --radius-lg: 16px;
        --radius-md: 8px;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        background-color: var(--card-bg);
        width: 100%;
        max-width: 400px;
        padding: 32px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        text-align: center;
      }

      header {
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 24px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      p.subtitle {
        color: var(--text-muted);
        font-size: 14px;
      }

      .input-group {
        margin-bottom: 24px;
        text-align: left;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-main);
      }

      input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }

      .btn {
        width: 100%;
        background-color: var(--accent);
        color: white;
        border: none;
        padding: 14px;
        border-radius: var(--radius-md);
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition:
          background-color 0.2s,
          transform 0.1s;
        margin-bottom: 24px;
      }

      .btn:hover {
        background-color: var(--accent-hover);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        transform: none;
      }

      /* Output Area */
      .qr-wrapper {
        display: none; /* Hidden initially */
        flex-direction: column;
        align-items: center;
        padding-top: 24px;
        border-top: 1px dashed var(--border-color);
        animation: fadeIn 0.4s ease forwards;
      }

      .qr-wrapper.active {
        display: flex;
      }

      #qrcode {
        background: white;
        padding: 16px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border-color);
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
      }

      /* Target the image directly generated by qrcode.js to ensure it's responsive */
      #qrcode img {
        max-width: 100%;
        height: auto;
      }

      .btn-outline {
        background-color: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      .btn-outline:hover {
        background-color: rgba(99, 102, 241, 0.05); /* very light accent */
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: -60px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: white;
        padding: 12px 24px;
        border-radius: 99px;
        font-size: 14px;
        font-weight: 500;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast.show {
        bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="brand">
          <i data-lucide="qr-code"></i>
          Kode Cipta
        </div>
        <p class="subtitle">Buat QR Code dengan cepat dan mudah.</p>
      </header>

      <div class="input-group">
        <label for="qr-input">Tautan atau Teks</label>
        <input
          type="text"
          id="qr-input"
          placeholder="Masukkan URL, Teks, atau Kontak..."
          autocomplete="off"
        />
      </div>

      <button class="btn" id="generate-btn">
        <i data-lucide="zap" style="width: 18px; height: 18px"></i>
        Buat QR Code
      </button>

      <div class="qr-wrapper" id="qr-wrapper">
        <div id="qrcode"></div>
        <button
          class="btn btn-outline"
          id="download-btn"
          style="margin-bottom: 0"
        >
          <i data-lucide="download" style="width: 18px; height: 18px"></i>
          Unduh Gambar
        </button>
      </div>
    </div>

    <div class="toast" id="toast">
      <i
        data-lucide="alert-circle"
        style="width: 18px; height: 18px; color: #f87171"
        id="toast-icon"
      ></i>
      <span id="toast-text">Teks tidak boleh kosong!</span>
    </div>

    <script>
      const qrInput = document.getElementById("qr-input");
      const generateBtn = document.getElementById("generate-btn");
      const qrWrapper = document.getElementById("qr-wrapper");
      const qrCodeDiv = document.getElementById("qrcode");
      const downloadBtn = document.getElementById("download-btn");
      const toast = document.getElementById("toast");
      const toastText = document.getElementById("toast-text");
      const toastIcon = document.getElementById("toast-icon");

      let qrcode = null;
      let toastTimeout;

      // Initialize Lucide Icons
      lucide.createIcons();

      function showToast(msg, isError = true) {
        toastText.textContent = msg;

        if (isError) {
          toastIcon.setAttribute("data-lucide", "alert-circle");
          toastIcon.style.color = "#F87171"; // Red
        } else {
          toastIcon.setAttribute("data-lucide", "check-circle-2");
          toastIcon.style.color = "#34D399"; // Green
        }

        // Re-render the specific icon in toast
        lucide.createIcons({
          root: toast,
        });

        toast.classList.add("show");

        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      function generateQR() {
        const text = qrInput.value.trim();

        if (!text) {
          showToast("Teks atau URL tidak boleh kosong!", true);
          /* Hide existing if any */
          qrWrapper.classList.remove("active");
          qrInput.focus();
          return;
        }

        // Clear previous QR code
        qrCodeDiv.innerHTML = "";

        // Generate new QR code
        qrcode = new QRCode(qrCodeDiv, {
          text: text,
          width: 200,
          height: 200,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.H, // High error correction
        });

        qrWrapper.classList.add("active");
      }

      function downloadQR() {
        // qrcode.js generates a canvas and an img element.
        // Sometimes it takes a split second for the canvas to draw and img src to populate.
        // Easiest cross-browser way is to grab the src of the img tag generated, or canvas dataURL.
        const canvas = qrCodeDiv.querySelector("canvas");
        const image = qrCodeDiv.querySelector("img");

        let downloadUrl = "";

        // Try image first if it has src, else use canvas
        if (image && image.getAttribute("src")) {
          downloadUrl = image.getAttribute("src");
        } else if (canvas) {
          downloadUrl = canvas.toDataURL("image/png");
        }

        if (downloadUrl) {
          const link = document.createElement("a");
          link.download = "qrcode.png";
          link.href = downloadUrl;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast("QR Code berhasil diunduh!", false);
        } else {
          showToast("Gagal memproses gambar. Coba lagi.", true);
        }
      }

      // Event Listeners
      generateBtn.addEventListener("click", generateQR);

      // Allow Enter key to trigger generation
      qrInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          generateQR();
        }
      });

      downloadBtn.addEventListener("click", downloadQR);
    </script>
  </body>
</html>
